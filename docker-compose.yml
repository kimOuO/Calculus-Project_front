version: '3.8'

services:
  calculus-frontend:
    build: .
    container_name: calculus_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v0.1/Calculus_oom/Calculus_metadata
    networks:
      - calculus-network
    restart: unless-stopped

networks:
  calculus-network:
    driver: bridge