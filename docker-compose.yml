version: '3.8'

services:
  calculus-frontend:
    build: .
    container_name: calculus_frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://calculus-backend:8000
    networks:
      - calculus-network
      - calculus_network
    restart: unless-stopped

networks:
  calculus-network:
    driver: bridge
  calculus_network:
    external: true